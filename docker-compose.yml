version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: watch-repair-db
    environment:
      POSTGRES_DB: watch_repair
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: watch-repair-backend
    ports:
      - "6040:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/watch_repair
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      UPLOAD_PATH: /app/uploads/photos
    volumes:
      - uploads:/app/uploads/photos
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: watch-repair-frontend
    ports:
      - "2040:80"
    depends_on:
      - backend
    networks:
      - app-network

  # server:
  #   build:
  #     context: ./server
  #     dockerfile: Dockerfile
  #   container_name: watch-repair-server
  #   ports:
  #     - "4040:4040"
  #   depends_on:
  #     - backend
  #   networks:
  #     - app-network

volumes:
  pgdata:
  uploads:

networks:
  app-network:
    driver: bridge
