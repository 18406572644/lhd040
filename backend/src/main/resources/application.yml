server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: watch-repair
  datasource:
    url: jdbc:postgresql://localhost:5432/watch_repair
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

jwt:
  secret: your-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  expiration: 86400000

upload:
  path: ./uploads/photos
